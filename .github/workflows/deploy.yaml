name: Deploy PolyAI Services

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Dev instance
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_INSTANCE_IP }}
          username: ubuntu
          key: ${{ secrets.DEV_INSTANCE_SSH_KEY }}
          script: |
            cd /home/ubuntu/PolyAI
            git reset --hard  
            git pull origin dev
            
            # 🐍 1. Update Python Virtual Environment Dependencies
            source .venv/bin/activate
            pip install -r services/yolo/requirements.txt
            pip install -r services/yolo/torch-requirements.txt
            pip install -r services/agent/requirements.txt
            
            # 🛠️ 2. Check and Install Node.js/npm dynamically if missing
            if ! command -v npm &> /dev/null; then
              echo "⚠️ npm not found! Installing Node.js 20 natively..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            
            # 📦 3. Install and Build Frontend Dependencies
            cd services/frontend
            npm install
            npm run build
            
            # 🚀 4. Restart All Background System Services
            sudo systemctl restart yolo.service
            sudo systemctl restart agent.service
            sudo systemctl restart frontend.service

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Prod instance
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_INSTANCE_IP }}
          username: ubuntu
          key: ${{ secrets.PROD_INSTANCE_SSH_KEY }}
          script: |
            cd /home/ubuntu/PolyAI
            git reset --hard
            git pull origin main
            
            # 🐍 1. Update Python Virtual Environment Dependencies
            source .venv/bin/activate
            pip install -r services/yolo/requirements.txt
            pip install -r services/yolo/torch-requirements.txt
            pip install -r services/agent/requirements.txt
            
            # 🛠️ 2. Check and Install Node.js/npm dynamically if missing
            if ! command -v npm &> /dev/null; then
              echo "⚠️ npm not found! Installing Node.js 20 natively..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            
            # 📦 3. Install and Build Frontend Dependencies
            cd services/frontend
            npm install
            npm run build
            
            # 🚀 4. Restart All Background System Services
            sudo systemctl restart yolo.service
            sudo systemctl restart agent.service
            sudo systemctl restart frontend.service