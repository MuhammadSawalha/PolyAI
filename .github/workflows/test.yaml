name: Run Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test-yolo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r services/yolo/torch-requirements.txt
          pip install -r services/yolo/requirements.txt

      - name: Run tests
        run: pytest tests/
        working-directory: services/yolo

  
  test-agent:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r services/agent/requirements.txt

      - name: Run tests
        env:
          MODEL: amazon.nova-lite-v1:0
          MODEL_PROVIDER: bedrock_converse
          AWS_REGION: us-east-1
        run: pytest tests/
        working-directory: services/agent